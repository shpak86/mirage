name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: mirage-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: mirage-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: mirage-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: mirage-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -trimpath -o dist/${{ matrix.asset_name }} ./cmd/mirage

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}